// ============ 帳單看板 ============

function getNextDate(day) {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  let target = new Date(year, month, day);
  if (target <= now) {
    target = new Date(year, month + 1, day);
  }
  return target;
}

function getDaysUntil(day) {
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  const target = getNextDate(day);
  target.setHours(0, 0, 0, 0);
  return Math.ceil((target - now) / (1000 * 60 * 60 * 24));
}

function formatDate(day) {
  const d = getNextDate(day);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function getUrgencyClass(days) {
  if (days <= 7) return "urgency-danger";
  if (days <= 14) return "urgency-warning";
  return "urgency-safe";
}

function renderBilling() {
  const groups = [];
  const seen = new Set();
  cards.forEach(c => {
    const key = `${c.billingDay}-${c.dueDay}`;
    if (!seen.has(key)) {
      seen.add(key);
      groups.push(cards.filter(x => x.billingDay === c.billingDay && x.dueDay === c.dueDay));
    }
  });
  groups.sort((a, b) => getDaysUntil(a[0].dueDay) - getDaysUntil(b[0].dueDay));

  const list = document.getElementById("billing-list");
  list.innerHTML = "";

  groups.forEach(group => {
    const c = group[0];
    const dueDays = getDaysUntil(c.dueDay);
    const billingDays = getDaysUntil(c.billingDay);
    const urgency = getUrgencyClass(dueDays);
    const names = group.map(x => x.name).join("、");

    const el = document.createElement("div");
    el.className = "card-item";
    el.innerHTML = `
      <div class="card-name">${names}</div>
      <div class="card-bank">${c.bank}</div>
      <div class="dates">
        <div class="date-block">
          <div class="label">帳單截止</div>
          <div class="days">${billingDays} 天</div>
          <div class="date-text">${formatDate(c.billingDay)}</div>
        </div>
        <div class="date-block ${urgency}">
          <div class="label">繳費截止</div>
          <div class="days">${dueDays} 天</div>
          <div class="date-text">${formatDate(c.dueDay)}</div>
        </div>
      </div>
    `;
    list.appendChild(el);
  });
}

// ============ 選卡建議 ============

function initPicker() {
  const select = document.getElementById("store-select");
  recommendations.forEach(r => {
    const opt = document.createElement("option");
    opt.value = r.store;
    opt.textContent = r.store;
    select.appendChild(opt);
  });
}

function showRecommendation() {
  const store = document.getElementById("store-select").value;
  const amountStr = document.getElementById("amount-input").value;
  const amount = amountStr ? parseInt(amountStr) : 0;
  const listEl = document.getElementById("result-list");

  if (!store) {
    listEl.classList.add("hidden");
    return;
  }

  const rec = recommendations.find(r => r.store === store);
  if (!rec) {
    listEl.classList.add("hidden");
    return;
  }

  // Check if any option needs CUBE plan switching
  const cubePlans = rec.options.filter(o => o.cubePlan).map(o => o.cubePlan);
  const uniqueCubePlans = [...new Set(cubePlans)];

  let html = "";

  rec.options.forEach((opt, i) => {
    const rank = i + 1;
    const cashback = amount > 0 ? Math.floor(amount * opt.rate / 100) : null;

    html += `
      <div class="result-item rank-${rank}">
        <span class="result-rank">${rank === 1 ? "推薦" : `第${rank}名`}</span>
        <div class="result-card-name">${opt.card}</div>
        <div class="result-bank">${opt.bank}</div>
        <div class="result-details">
          <span class="result-tag tag-rate">回饋 ${opt.rate}%</span>
          <span class="result-tag tag-type">${opt.type}</span>
          <span class="result-tag tag-pay">${opt.pay}</span>
          ${cashback !== null ? `<span class="result-tag tag-cashback">可回饋 $${cashback}</span>` : ""}
        </div>
        <div class="result-reason">${opt.note}</div>
        ${opt.cubePlan ? `<div class="result-note">需切換 CUBE 方案為「${opt.cubePlan}」（每日限切換 1 次）</div>` : ""}
      </div>
    `;
  });

  // Add CUBE switch reminder if applicable
  if (uniqueCubePlans.length > 0) {
    const topCube = rec.options.find(o => o.cubePlan);
    if (topCube && rec.options.indexOf(topCube) === 0) {
      html += `
        <div class="cube-switch-note">
          提醒：CUBE 卡每日只能切換 1 次方案。若今天已切換為其他方案，可考慮使用第 2、3 名的卡片。
        </div>
      `;
    }
  }

  listEl.innerHTML = html;
  listEl.classList.remove("hidden");
}

// ============ Tab 切換 ============

function switchTab(tabName, btn) {
  document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".tab-bar button").forEach(el => el.classList.remove("active"));
  document.getElementById("tab-" + tabName).classList.add("active");
  btn.classList.add("active");
}
